<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Pomodoro</title>
    <style>
        :root {
            --bg-color: #ba4949; /* Work Red */
            --button-color: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .timer-display {
            font-size: 100px;
            font-weight: bold;
            margin: 20px 0;
        }

        .controls button {
            background: white;
            color: var(--bg-color);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0px 6px #ebebeb;
        }

        .controls button:active {
            box-shadow: none;
            transform: translateY(6px);
        }

        .modes {
            margin-bottom: 20px;
        }

        .modes button {
            background: none;
            border: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.8;
        }

        .modes button.active {
            background: var(--button-color);
            font-weight: bold;
            border-radius: 4px;
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="modes">
        <button onclick="setMode('work')" id="work-btn" class="active">Pomodoro</button>
        <button onclick="setMode('short')" id="short-btn">Short Break</button>
        <button onclick="setMode('long')" id="long-btn">Long Break</button>
    </div>

    <div class="timer-display" id="timer">25:00</div>

    <div class="controls">
        <button onclick="toggleTimer()" id="start-btn">Start</button>
    </div>
</div>

<script>
    let timeLeft = 25 * 60;
    let timerId = null;
    let isRunning = false;
    let currentMode = 'work';

    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start-btn');

    const themes = {
        work: { time: 25 * 60, color: '#ba4949' },
        short: { time: 5 * 60, color: '#38858a' },
        long: { time: 15 * 60, color: '#397097' }
    };

    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        const formatted = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        timerDisplay.textContent = formatted;
        document.title = `${formatted} - Focus!`;
    }

    function setMode(mode) {
        currentMode = mode;
        timeLeft = themes[mode].time;
        document.documentElement.style.setProperty('--bg-color', themes[mode].color);
        
        // Update button colors to match theme
        startBtn.style.color = themes[mode].color;

        // UI active state
        document.querySelectorAll('.modes button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`${mode}-btn`).classList.add('active');

        stopTimer();
        updateDisplay();
    }

    function toggleTimer() {
        if (isRunning) {
            stopTimer();
        } else {
            startTimer();
        }
    }

    function startTimer() {
        isRunning = true;
        startBtn.textContent = "Pause";
        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerId);
                alert("Time's up!");
                setMode('work');
            }
        }, 1000);
    }

    function stopTimer() {
        isRunning = false;
        startBtn.textContent = "Start";
        clearInterval(timerId);
    }

    // Initialize display color
    startBtn.style.color = themes.work.color;
</script>

</body>
</html>
