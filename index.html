<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZenStudy Pomodoro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ZenStudy">

    <style>
        :root { --bg-color: #ba4949; --btn-bg: rgba(255, 255, 255, 0.2); }
        body {
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; color: white; overflow: hidden;
        }
        .container { text-align: center; width: 90%; max-width: 400px; }
        .timer-display { font-size: 100px; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; }
        
        .main-btn {
            background: white; color: var(--bg-color); border: none;
            padding: 18px 60px; font-size: 22px; font-weight: bold;
            border-radius: 12px; cursor: pointer; box-shadow: 0px 6px #ddd;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: none; }

        .stats-card {
            margin-top: 30px; background: rgba(0,0,0,0.2);
            padding: 15px; border-radius: 15px; backdrop-filter: blur(5px);
            display: none; /* Hidden until login */
        }

        #auth-btn {
            margin-top: 20px; background: none; border: 1px solid white;
            color: white; padding: 8px 20px; border-radius: 20px; cursor: pointer;
        }

        .settings-btn { position: absolute; top: 50px; right: 20px; font-size: 24px; cursor: pointer; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="settings-btn" onclick="alert('Settings feature coming soon!')">⚙️</div>

    <div class="container">
        <div id="user-info" style="margin-bottom: 10px; font-weight: 500;"></div>
        
        <div class="timer-display" id="timer">25:00</div>
        
        <button class="main-btn" id="start-btn">START</button>

        <div class="stats-card" id="stats-card">
            <div style="font-size: 12px; opacity: 0.8;">TOTAL FOCUS TIME</div>
            <div style="font-size: 24px; font-weight: bold;"><span id="total-minutes">0</span> MINS</div>
        </div>

        <button id="auth-btn">Login with Google to Track Time</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyBAuig-hearPfpRAYrLS21jVRszxhzI9V4",
            authDomain: "zenstudy-2fe64.firebaseapp.com",
            databaseURL: "https://zenstudy-2fe64-default-rtdb.firebaseio.com",
            projectId: "zenstudy-2fe64",
            storageBucket: "zenstudy-2fe64.firebasestorage.app",
            messagingSenderId: "650684766921",
            appId: "1:650684766921:web:b445a2ddedce7bdcdfcb18",
            measurementId: "G-KG91HQGMM8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // App State
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;
        let currentUser = null;

        // UI Elements
        const timerEl = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const authBtn = document.getElementById('auth-btn');
        const statsCard = document.getElementById('stats-card');
        const totalMinEl = document.getElementById('total-minutes');
        const userDisplay = document.getElementById('user-info');

        // Handle Auth
        authBtn.onclick = () => {
            if (!currentUser) {
                signInWithPopup(auth, provider);
            } else {
                signOut(auth);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                authBtn.textContent = "Logout";
                statsCard.style.display = "block";
                userDisplay.textContent = `Hello, ${user.displayName.split(' ')[0]}!`;
                loadUserStats();
            } else {
                currentUser = null;
                authBtn.textContent = "Login with Google to Track Time";
                statsCard.style.display = "none";
                userDisplay.textContent = "";
            }
        });

        async function loadUserStats() {
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                totalMinEl.textContent = userSnap.data().totalMinutes || 0;
            } else {
                await setDoc(userRef, { totalMinutes: 0 });
            }
        }

        // Timer Logic
        startBtn.onclick = () => {
            if (isRunning) {
                clearInterval(timerId);
                isRunning = false;
                startBtn.textContent = "START";
            } else {
                isRunning = true;
                startBtn.textContent = "PAUSE";
                timerId = setInterval(async () => {
                    timeLeft--;
                    updateDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        isRunning = false;
                        startBtn.textContent = "START";
                        timeLeft = 25 * 60; 
                        updateDisplay();
                        
                        if (currentUser) {
                            const userRef = doc(db, "users", currentUser.uid);
                            await updateDoc(userRef, { totalMinutes: increment(25) });
                            loadUserStats();
                        }
                        alert("Session complete! Great job.");
                    }
                }, 1000);
            }
        };

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerEl.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    </script>
</body>
</html>
    startBtn.style.color = themes.work.color;
</script>

</body>
</html>
