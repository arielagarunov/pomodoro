<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Quest: RPG Timer</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c1e14;
            --iron: #3d3d3d;
            --gold: #d4af37;
            --ruby: #a52a2a;
            --border: 4px double var(--ink);
        }

        body {
            background: #1a1a1a; /* Dark dungeon background */
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--ink);
            font-family: 'Georgia', serif;
            margin: 0; overflow: hidden;
        }

        /* The Scroll/Parchment Container */
        .scroll {
            background: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            width: 90%; max-width: 400px;
            margin: 40px auto;
            padding: 30px;
            border: var(--border);
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 50px rgba(0,0,0,0.1);
            border-radius: 5px;
            position: relative;
            text-align: center;
        }

        .scroll::before, .scroll::after {
            content: ''; position: absolute; height: 15px; width: 105%;
            background: #8b4513; left: -2.5%; border-radius: 10px;
            border: 2px solid #3d1f0a;
        }
        .scroll::before { top: -10px; }
        .scroll::after { bottom: -10px; }

        /* Typography */
        h1 { font-variant: small-caps; letter-spacing: 2px; margin-top: 0; border-bottom: 2px solid var(--ink); }
        .rank-label { font-weight: bold; color: var(--ruby); font-size: 1.2rem; display: block; margin-top: 10px; }

        /* RPG Stats */
        .stats-box {
            display: flex; justify-content: space-around;
            background: rgba(0,0,0,0.05); padding: 15px;
            border-radius: 10px; margin: 20px 0; border: 1px dashed var(--ink);
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-val { font-size: 1.2rem; font-weight: 900; }

        /* Custom RPG Buttons */
        .btn-rpg {
            background: var(--iron); color: #eee;
            border: 3px solid var(--gold); padding: 15px;
            font-family: 'Georgia', serif; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
            width: 100%; border-radius: 0; margin-top: 15px;
            box-shadow: 0 4px 0 #1a1a1a;
        }
        .btn-rpg:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a1a1a; }
        
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 15px 0; }
        .btn-small { background: #d2b48c; border: 1px solid var(--ink); color: var(--ink); padding: 10px 5px; font-size: 0.8rem; }
        .btn-small.selected { background: var(--gold); font-weight: bold; }

        /* Timer Modal */
        #timerView {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: none; justify-content: center; align-items: center;
        }
        #timerView.open { display: flex; }

        #timer { font-size: 5rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); font-family: 'Courier New', monospace; }

        /* Level Up Progress Bar */
        .xp-bar-bg { width: 100%; height: 15px; background: #3d1f0a; margin-top: 10px; border: 1px solid var(--gold); }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #ffdf00); width: 0%; transition: 1s; }

        /* Auth Screen */
        #authOverlay { position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        input { background: var(--parchment); border: 2px solid var(--iron); padding: 12px; margin: 5px; width: 80%; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="scroll" style="max-width: 300px;">
            <h1>Identify Traveler</h1>
            <input type="email" id="email" placeholder="Coded Name (Email)">
            <input type="password" id="password" placeholder="Secret Phrase">
            <button class="btn-rpg" onclick="handleAuth()">Enter Realm</button>
        </div>
    </div>

    <div id="homeView" class="scroll">
        <h1>Quest Log</h1>
        <div class="stats-box">
            <div class="stat-item"><span class="stat-val" id="goldVal">0</span><span>Gold</span></div>
            <div class="stat-item"><span class="stat-val" id="streakVal">1</span><span>Streak</span></div>
        </div>

        <span class="rank-label" id="rankTitle">Peasant</span>
        <div class="xp-bar-bg"><div id="xpProgress" class="xp-bar-fill"></div></div>
        <p id="xpLabel" style="font-size: 0.8rem;">0 / 1000 XP to next Rank</p>

        <div style="margin-top: 30px;">
            <p style="font-size: 0.8rem; font-style: italic;">Choose thy Quest duration:</p>
            <div class="preset-grid">
                <button class="btn-small selected" onclick="setMode(25, 5, this)">Short Skirmish</button>
                <button class="btn-small" onclick="setMode(50, 10, this)">Great Battle</button>
                <button class="btn-small" onclick="setMode(90, 15, this)">Epic Crusade</button>
            </div>
        </div>

        <button class="btn-rpg" onclick="openTimer()">Embark on Quest</button>
    </div>

    <div id="timerView">
        <div style="text-align: center;">
            <h2 id="status" style="color: white; letter-spacing: 4px;">FOCUSING...</h2>
            <div id="timer">25:00</div>
            <button class="btn-rpg" id="startBtn" onclick="toggleTimer()">Begin</button>
            <button class="btn-ghost" onclick="closeTimer()" style="color: grey; background: none; border: none; margin-top: 20px; cursor: pointer;">Abandon Quest</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAuig-hearPfpRAYrLS21jVRszxhzI9V4",
            authDomain: "zenstudy-2fe64.firebaseapp.com",
            projectId: "zenstudy-2fe64",
            storageBucket: "zenstudy-2fe64.firebasestorage.app",
            messagingSenderId: "650684766921",
            appId: "1:650684766921:web:b445a2ddedce7bdcdfcb18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let workMins = 25, breakMins = 5, timeLeft = 1500;
        let timerId = null, isWork = true, userXP = 0;

        // Navigation & Audio (Mental RPG Feedback)
        window.openTimer = () => document.getElementById('timerView').classList.add('open');
        window.closeTimer = () => {
            if(timerId) { clearInterval(timerId); timerId = null; }
            document.getElementById('timerView').classList.remove('open');
        };

        window.setMode = (w, b, btn) => {
            workMins = w; breakMins = b; timeLeft = w * 60;
            document.querySelectorAll('.btn-small').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            updateDisplay();
        };

        // Auth Logic
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); }
            catch (e) { await createUserWithEmailAndPassword(auth, email, pass); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authOverlay').style.display = 'none';
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) userXP = snap.data().xp || 0;
                else await setDoc(doc(db, "users", user.uid), { xp: 0, gold: 0 });
                renderRank();
            }
        });

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        window.toggleTimer = () => {
            if (timerId) {
                clearInterval(timerId); timerId = null;
                document.getElementById('startBtn').textContent = "Resume";
            } else {
                document.getElementById('startBtn').textContent = "Survive";
                timerId = setInterval(() => {
                    if (timeLeft > 0) { timeLeft--; updateDisplay(); }
                    else { completeQuest(); }
                }, 1000);
            }
        };

        async function completeQuest() {
            clearInterval(timerId); timerId = null;
            if (isWork) {
                const goldGained = workMins * 5;
                userXP += (workMins * 10);
                await updateDoc(doc(db, "users", auth.currentUser.uid), { xp: increment(workMins * 10), gold: increment(goldGained) });
                confetti({ particleCount: 100, colors: ['#d4af37', '#ffffff'], shapes: ['square'] });
            }
            isWork = !isWork; timeLeft = (isWork ? workMins : breakMins) * 60;
            document.getElementById('status').textContent = isWork ? "FOCUSING..." : "RESTING...";
            document.getElementById('startBtn').textContent = "Begin";
            updateDisplay(); renderRank();
        }

        function renderRank() {
            const ranks = [
                { t: "Peasant", i: "🌾", min: 0, next: 1000 },
                { t: "Squire", i: "🛡️", min: 1000, next: 5000 },
                { t: "Knight", i: "⚔️", min: 5000, next: 15000 },
                { t: "Paladin", i: "✨", min: 15000, next: 50000 },
                { t: "Lord", i: "👑", min: 50000, next: 100000 }
            ];
            const cur = [...ranks].reverse().find(r => userXP >= r.min);
            document.getElementById('rankTitle').textContent = cur.i + " " + cur.t;
            document.getElementById('goldVal').textContent = Math.floor(userXP / 2);
            const prog = ((userXP - cur.min) / (cur.next - cur.min)) * 100;
            document.getElementById('xpProgress').style.width = Math.min(prog, 100) + "%";
            document.getElementById('xpLabel').textContent = `${userXP} / ${cur.next} XP to become a ${ranks[ranks.indexOf(cur)+1]?.t || 'Legend'}`;
        }

        updateDisplay();
    </script>
</body>
</html>
