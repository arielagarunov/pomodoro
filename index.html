<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Phantom Forum - Live</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030303; color: #a1a1a1; font-family: 'Courier New', monospace; overflow: hidden; }
        .ghost-msg { border-left: 1px solid; padding-left: 20px; margin-bottom: 24px; animation: ghostFade 0.6s ease-out; }
        @keyframes ghostFade { from { opacity: 0; filter: blur(5px); } to { opacity: 1; filter: blur(0); } }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // YOUR KEY IS NOW EMBEDDED
        const VORTEX_KEY = "AIzaSyCtrqIQJGvUQOmqmkPq-WaZah_lbIM6l-o";

        const AGENTS = [
            { name: 'SILAS', color: '#ff3333', system: 'You are Silas, a cynical, cold ghost. You find the user\'s presence annoying. Short, blunt replies.' },
            { name: 'MINA', color: '#3399ff', system: 'You are Mina, an ethereal, poetic ghost. You are fascinated by the user. Use flowery, soft language.' },
            { name: 'THE ECHO', color: '#888888', system: 'You are The Echo. You repeat parts of what the user says but with an ominous, dark twist.' }
        ];

        function App() {
            const [messages, setMessages] = useState([{ sender: 'SYSTEM', content: 'The connection is stable. Speak into the void.', color: '#333' }]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(null);
            const scrollRef = useRef(null);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isTyping]);

            const callGemini = async (agent, userPrompt) => {
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${VORTEX_KEY}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `${agent.system} The user said: "${userPrompt}"` }] }]
                        })
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (err) {
                    return "...the mist thickens (Error: Check Key or Connection)...";
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userText = input;
                setMessages(prev => [...prev, { sender: 'YOU', content: userText, color: '#fff' }]);
                setInput('');

                // Agents respond one after another
                for (const agent of AGENTS) {
                    setIsTyping(agent.name);
                    // Add a tiny delay to feel more natural
                    await new Promise(r => setTimeout(r, 500));
                    const aiResponse = await callGemini(agent, userText);
                    setMessages(prev => [...prev, { sender: agent.name, content: aiResponse, color: agent.color }]);
                    setIsTyping(null);
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-2xl mx-auto p-6">
                    <header className="mb-8 opacity-50">
                        <h1 className="text-xl tracking-[0.5em] font-bold">PHANTOM_FORUM v1.0</h1>
                    </header>

                    <div className="flex-1 overflow-y-auto mb-4 space-y-4 pr-4">
                        {messages.map((msg, i) => (
                            <div key={i} className="ghost-msg" style={{ borderColor: msg.color }}>
                                <div className="text-[10px] tracking-widest font-black mb-1" style={{ color: msg.color }}>{msg.sender}</div>
                                <div className="text-gray-300 leading-relaxed">{msg.content}</div>
                            </div>
                        ))}
                        {isTyping && <div className="text-[10px] text-gray-800 animate-pulse">{isTyping} is manifesting...</div>}
                        <div ref={scrollRef} />
                    </div>

                    <form onSubmit={handleSend} className="relative mt-auto border-t border-gray-900 pt-4">
                        <input 
                            className="w-full bg-transparent outline-none py-4 text-white placeholder-gray-800"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Type your message to the spirits..."
                            autoFocus
                        />
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
