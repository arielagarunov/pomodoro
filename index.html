<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PomoFocus</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PomoFocus">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg-color: #ba4949; 
            --button-color: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            padding-top: env(safe-area-inset-top);
            overscroll-behavior: none;
            user-select: none;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            z-index: 1;
        }

        /* Settings Panel */
        #settings-panel {
            display: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .setting-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-group input {
            width: 60px;
            padding: 8px;
            border-radius: 6px;
            border: none;
            text-align: center;
            font-size: 16px;
        }

        /* Timer UI */
        .timer-display {
            font-size: clamp(80px, 25vw, 120px);
            font-weight: 700;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .controls button, .save-btn {
            background: white;
            color: var(--bg-color);
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0px 6px #ebebeb;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .controls button:active {
            box-shadow: none;
            transform: translateY(6px);
        }

        .modes {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .modes button {
            background: none;
            border: none;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.7;
            border-radius: 6px;
        }

        .modes button.active {
            background: var(--button-color);
            opacity: 1;
            font-weight: bold;
        }

        .settings-toggle {
            position: absolute;
            top: calc(20px + env(safe-area-inset-top));
            right: 20px;
            background: var(--button-color);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }
    </style>
</head>
<body>

<button class="settings-toggle" onclick="toggleSettings()">⚙️</button>

<audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<div class="container">
    <div id="settings-panel">
        <h3 style="margin-top: 0;">Settings (min)</h3>
        <div class="setting-group">
            <label>Work</label>
            <input type="number" id="work-input" value="25">
        </div>
        <div class="setting-group">
            <label>Short Break</label>
            <input type="number" id="short-input" value="5">
        </div>
        <div class="setting-group">
            <label>Long Break</label>
            <input type="number" id="long-input" value="15">
        </div>
        <button class="save-btn" style="padding: 10px 30px; font-size: 16px;" onclick="saveSettings()">Save & Close</button>
    </div>

    <div class="modes">
        <button onclick="setMode('work')" id="work-btn" class="active">Pomodoro</button>
        <button onclick="setMode('short')" id="short-btn">Short</button>
        <button onclick="setMode('long')" id="long-btn">Long</button>
    </div>

    <div class="timer-display" id="timer">25:00</div>

    <div class="controls">
        <button onclick="toggleTimer()" id="start-btn">Start</button>
    </div>
</div>

<script>
    // Configuration Object
    let themes = {
        work: { time: 25 * 60, color: '#ba4949' },
        short: { time: 5 * 60, color: '#38858a' },
        long: { time: 15 * 60, color: '#397097' }
    };

    // Load from LocalStorage if exists
    if (localStorage.getItem('pomoSettings')) {
        const saved = JSON.parse(localStorage.getItem('pomoSettings'));
        themes.work.time = saved.work * 60;
        themes.short.time = saved.short * 60;
        themes.long.time = saved.long * 60;
        document.getElementById('work-input').value = saved.work;
        document.getElementById('short-input').value = saved.short;
        document.getElementById('long-input').value = saved.long;
    }

    let timeLeft = themes.work.time;
    let timerId = null;
    let isRunning = false;
    let currentMode = 'work';

    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start-btn');
    const alarm = document.getElementById('alarm-sound');

    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        const formatted = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        timerDisplay.textContent = formatted;
        document.title = `${formatted} - Focus`;
    }

    function setMode(mode) {
        currentMode = mode;
        timeLeft = themes[mode].time;
        document.documentElement.style.setProperty('--bg-color', themes[mode].color);
        startBtn.style.color = themes[mode].color;

        document.querySelectorAll('.modes button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`${mode}-btn`).classList.add('active');

        stopTimer();
        updateDisplay();
    }

    function toggleTimer() {
        isRunning ? stopTimer() : startTimer();
    }

    function startTimer() {
        isRunning = true;
        startBtn.textContent = "Pause";
        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerId);
                alarm.play().catch(() => {}); 
                stopTimer();
                alert("Session Finished!");
            }
        }, 1000);
    }

    function stopTimer() {
        isRunning = false;
        startBtn.textContent = "Start";
        clearInterval(timerId);
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        const w = document.getElementById('work-input').value;
        const s = document.getElementById('short-input').value;
        const l = document.getElementById('long-input').value;

        themes.work.time = w * 60;
        themes.short.time = s * 60;
        themes.long.time = l * 60;

        // Save to LocalStorage
        localStorage.setItem('pomoSettings', JSON.stringify({work: w, short: s, long: l}));

        setMode(currentMode);
        toggleSettings();
    }

    // Initialize
    updateDisplay();
    startBtn.style.color = themes.work.color;
</script>

</body>
</html>

</html>
